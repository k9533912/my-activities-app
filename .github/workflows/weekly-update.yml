name: 매주 월요일 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 오전 9시 KST (00:00 UTC)
  workflow_dispatch:      # GitHub Actions 화면에서 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 주간 데이터 수집 실행
        run: node scripts/fetch-weekly-data.js

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/liveData.json
          git diff --staged --quiet || git commit -m "auto: 주간 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
